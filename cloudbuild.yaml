# WeatherNext 2.0 Dashboard - Cloud Build Configuration for NCM UAE
# 64-Member Ensemble + 15-Day Probabilistic Forecasting Platform

steps:
  # Step 1: Build Docker image with versioning and NCM metadata
  - name: 'gcr.io/cloud-builders/docker'
    secretEnv: ['MAPBOX_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BUILD_VERSION="4.0.0"
        BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        GIT_COMMIT="cloud-build"

        docker build \
          --build-arg NEXT_PUBLIC_MAPBOX_TOKEN="$$MAPBOX_TOKEN" \
          --build-arg NEXT_PUBLIC_APP_NAME="WeatherNext Dashboard" \
          --build-arg BUILD_VERSION="$${BUILD_VERSION}" \
          --build-arg BUILD_DATE="$${BUILD_DATE}" \
          --build-arg GIT_COMMIT="$${GIT_COMMIT}" \
          --build-arg BUILD_ENVIRONMENT=production \
          -t us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:latest \
          -t us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:v4 \
          -t us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:$${BUILD_VERSION} \
          -t us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:uae-production \
          .
    timeout: '1200s'
    id: 'build-image'

  # Step 2: Push versioned images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:latest'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:v4'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run with NCM UAE configuration (v4 optimized)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'weathernext-ncm-demo'
      - '--image=us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:v4'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--allow-unauthenticated'
      # Environment variables for production
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=ctoteam,BIGQUERY_PROJECT_ID=ctoteam,BIGQUERY_DATASET=weathernext_2,BIGQUERY_TABLE=weathernext_2_0_0,BIGQUERY_DERIVED_DATASET=weathernext_derived,GEMINI_MODEL_NAME=gemini-3.1-pro-preview,NEXT_PUBLIC_APP_NAME=WeatherNext AI Intelligence,FORECAST_DAYS=15,ENSEMBLE_MEMBERS=64,ENABLE_PROBABILISTIC_ALERTS=true,ENABLE_TAIL_RISK_ANALYSIS=true,CONFIDENCE_THRESHOLD_HIGH=0.8,CONFIDENCE_THRESHOLD_LOW=0.5'
      # Secrets from Secret Manager
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,MAPBOX_TOKEN=MAPBOX_TOKEN:latest'
    timeout: '600s'

  # Step 4: Run smoke test
  - name: 'gcr.io/cloud-builders/gke-deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Waiting for Cloud Run service to be ready..."
        sleep 10

        SERVICE_URL=$(gcloud run services describe weathernext-ncm-demo --region us-central1 --format 'value(status.url)')
        echo "Testing service at: $${SERVICE_URL}"

        curl -f "$${SERVICE_URL}" || exit 1
        echo "✓ Service health check passed"

availableSecrets:
  secretManager:
    - versionName: projects/ctoteam/secrets/MAPBOX_TOKEN/versions/latest
      env: 'MAPBOX_TOKEN'

images:
  - 'us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:latest'
  - 'us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:v4'
  - 'us-central1-docker.pkg.dev/ctoteam/weathernext/dashboard:uae-production'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'

timeout: '2400s'

# Build trigger configuration
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'weathernext-ncm-demo'
  _ARTIFACT_REPO: 'weathernext'
